<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
	th:replace="~{base::layout(~{::section})}">
<head>
<meta charset="ISO-8859-1">
<title>forgot-password</title>
</head>
<body>
	<section class="forgot-section">

		<div class="container-fluid forgot-image">
			<div class="row align-items-center justify-content-center min-vh-100">


				<!-- Right Form -->
				<div class="col-md-5 col-lg-4 m-5">
					<div class="card p-4 shadow-lg border-0 rounded-4">

						<h3 class="text-center fw-bold mb-3">Forgot Password 🔒</h3>
						<p class="text-center text-muted mb-4">Enter your email to
							reset your password</p>

						<!-- Success Message -->
						<th:block th:if="${session.succMsg}">
							<div class="alert alert-success text-center"
								style="font-size: 27px">[[${session.succMsg}]]</div>
							<th:block th:text="${@commonServiceImpl.removeSessionMessage()}"></th:block>
						</th:block>

						<!-- Error Message -->
						<th:block th:if="${session.errorMsg}">
							<div class="alert alert-danger text-center">
								[[${session.errorMsg}]]</div>
							<th:block th:text="${@commonServiceImpl.removeSessionMessage()}"></th:block>
						</th:block>

						<form action="/forgot-password" method="post">

							<div class="mb-3">
								<label class="form-label fw-semibold">Email Address</label> <input
									class="form-control rounded-3 p-2" name="email" type="email"
									placeholder="Enter your email" required>
							</div>

							<button type="submit"
								class="btn btn-primary w-100 rounded-3 mt-2">Send Reset
								Link</button>

						</form>

						<p class="text-center mt-3">
							<a href="/signin" class="text-decoration-none"> ← Back to
								Login </a>
						</p>

					</div>
				</div>

			</div>
		</div>

	</section>
</body>
</html>
