<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
	th:replace="~{base::layout(~{::section})}">
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
</head>
<body>

	<section>
		<div
			class="container-fluid min-vh-100 d-flex align-items-center bg-login">
			<div class="container" style="margin-top: 70px; padding: 50px 0;">
				<div class="row shadow-lg rounded-4 overflow-hidden login-wrapper">

					<!-- LEFT IMAGE SECTION -->
					<div class="col-md-6 d-none d-md-block p-0">
						<div class="login-image">
							<div class="overlay-text">
								<h2 class="brand">Travelista Tours</h2>
								<p>Travel is the only purchase that enriches you in ways
									beyond material wealth</p>
							</div>
						</div>
					</div>

					<!-- RIGHT LOGIN FORM -->
					<div class="col-md-6 bg-white p-5">
						<div class="text-center mb-1">
							<h2 class="fw-bold text-primary">Welcome</h2>
							<p class="text-muted">Login with Email</p>
							<div th:if="${param.error}"
								class="alert alert-danger text-center fs-5">

								<th:block
									th:if="${session.SPRING_SECURITY_LAST_EXCEPTION!=null}">
									[[${session.SPRING_SECURITY_LAST_EXCEPTION.message}]]
								</th:block>
							</div>

							<div th:if="${param.logout}" class="alert alert-success fs-">
								Logout Success</div>
						</div>

						<form action="/login" method="post">
							<div class="mb-3">
								<label class="form-label small">Email ID</label>
								<div class="input-group">
									<span class="input-group-text bg-light"> <i
										class="fa-solid fa-envelope"></i>
									</span> <input type="email" name="username" class="form-control"
										placeholder="Enter email" required>
								</div>
							</div>

							<div class="mb-3">
								<label class="form-label small">Password</label>
								<div class="input-group">
									<span class="input-group-text bg-light"> <i
										class="fa-solid fa-lock"></i>
									</span> <input type="password" name="password" class="form-control"
										placeholder="Enter password" required>
								</div>
							</div>

							<div class="text-end mb-3">
								<a href="/forgot-password" class="small text-decoration-none">
									Forgot your password? </a>
							</div>

							<button class="btn  w-100 py-2 "
								style="background: #ff6a00; color: white;">LOGIN</button>

							<div class="text-center my-3 text-muted">OR</div>

							<!-- SOCIAL LOGIN (UI ONLY) -->

							<div class="d-flex justify-content-center gap-3">
								<a
									th:href="@{'/oauth2/authorization/google?prompt=select_account'}"
									class="btn btn-light social-btn"> <i
									class="fa-brands fa-google"></i></a>
								<!-- <button type="button" class="btn btn-light social-btn">
									<i class="fa-brands fa-google"></i>
								</button> -->
								<button type="button" class="btn btn-light social-btn">
									<i class="fa-brands fa-facebook-f"></i>
								</button>
								<button type="button" class="btn btn-light social-btn">
									<i class="fa-brands fa-apple"></i>
								</button>
							</div>

							<p class="text-center mt-4 small">
								Don’t have an account? <a href="/register"
									class="text-decoration-none fw-semibold"> Register Now </a>
							</p>
						</form>
					</div>

				</div>
			</div>
		</div>
	</section>

</body>
</html>
