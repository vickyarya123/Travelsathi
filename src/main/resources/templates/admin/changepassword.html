<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
	th:replace="~{base::layout(~{::section})}">
<head>
<meta charset="ISO-8859-1">
<title>change-password</title>
</head>
<body>
	<section>
		
		<div class="container mt-5">
			<div class="row justify-content-center">

				<div class="col-md-6" style="margin:80px 0 50px 0;">
					<div class="card shadow-lg border-0 rounded-4">

						<!-- Header -->
						<p class="text-center fs-2 pb-4"
							style="border-bottom: 2px solid #ccc; box-shadow: 0 4px 6px -4px rgba(0, 0, 0, 0.2);">
							Change Password</p>


						<!-- Body -->
						<div class="card-body p-4">

							<!-- Success Message -->
							<th:block th:if="${session.succMsg}">
								<div class="alert alert-success text-center"
									style="font-size: 27px">[[${session.succMsg}]]</div>
								<th:block th:text="${@commonServiceImpl.removeSessionMessage()}"></th:block>
							</th:block>

							<!-- Error Message -->
							<th:block th:if="${session.errorMsg}">
								<div class="alert alert-danger text-center"
									style="font-size: 27px">[[${session.errorMsg}]]</div>
								<th:block th:text="${@commonServiceImpl.removeSessionMessage()}"></th:block>
							</th:block>

							<!-- Form -->
							<form action="/admin/change-password" method="post">

								<div class="mb-3">
									<label class="form-label fw-bold">Current Password</label> <input
										type="password" name="currentPassword"
										class="form-control rounded-3" required>
								</div>

								<div class="mb-3">
									<label class="form-label fw-bold">New Password</label> <input
										type="password" name="newPassword"
										class="form-control rounded-3" required>
								</div>

								<div class="mb-3">
									<label class="form-label fw-bold">Confirm Password</label> <input
										type="password" name="confirmPassword"
										class="form-control rounded-3" required>
								</div>

								<div class="text-center">
									<button class="btn btn-success px-4 rounded-3">Update
										Password</button>
								</div>

							</form>

						</div>
					</div>
				</div>

			</div>
		</div>

	</section>
</body>
</html>
