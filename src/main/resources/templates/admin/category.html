<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
	th:replace="~{base::layout(~{::section})}">
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
</head>
<body>

	<section>
	

		<div class="container-fluid p-5 mt-5">
			<div class="row">
				<div class="col-md-3">
					<div class="card card-sh filters-box">
						<div class="card-header text-center ">
							<p class="fs-4">Add Category</p>

							<th:block th:if="${session.succMsg}">
								<p class="text-success fw-bold" style="font-size: 27px">[[${session.succMsg}]]</p>
								<th:block th:text="${@commonServiceImpl.removeSessionMessage()}"></th:block>
							</th:block>

							<th:block th:if="${session.errorMsg}">
								<p class="text-danger fw-bold" style="font-size: 27px">[[${session.errorMsg}]]</p>
								<th:block th:text="${@commonServiceImpl.removeSessionMessage()}"></th:block>
							</th:block>

						</div>
						<div class="card-body">
							<form action="/admin/saveCategory" method="post"
								enctype="multipart/form-data" onsubmit="return validateForm()">

								<div class="mb-3">
									<label>Enter Category</label> <input type="text" name="name"
										id="categoryName" class="form-control" required> <small
										id="nameError" style="color: red;"></small>
								</div>

								<div class="mb-3">
									<label>Status</label>

									<div class="form-check">
										<input class="form-check-input" type="radio" checked
											value="true" name="isActive"> <label
											class="form-check-label">Active</label>
									</div>

									<div class="form-check">
										<input class="form-check-input" type="radio" name="isActive"
											value="false"> <label class="form-check-label">Inactive</label>
									</div>
								</div>

								<div class="mb-3">
									<label>Upload Image</label> <input type="file" name="file"
										id="imageFile" class="form-control" required> <small
										id="imageError" style="color: red;"></small>
								</div>

								<button class="btn btn-primary col-md-12 mt-2">Save</button>
							</form>

						</div>
					</div>
				</div>

				<div class="col-md-8">
					<div class="card card-sh">
						<div class="card-header text-center fs-3">Category Details</div>
						<div class="card-body text-center">
							<table class="table text-center align-middle">
								<thead>
									<tr>
										<th scope="col">Sl No</th>
										<th scope="col">Category</th>
										<th scope="col">Status</th>
										<th scope="col">Image</th>
										<th scope="col">Action</th>
									</tr>
								</thead>
								<tbody>
									<tr th:each="cat,c:${categorys}">
										<th scope="row">[[${c.count}]]</th>
										<td style="font-size: 25px">[[${cat.name}]]</td>
										<td style="font-size: 30px">[[${cat.isActive}]]</td>
										<td><img style="border-radius: 10px"
											th:src="@{'/images/category/' + ${cat.imageName}}"
											width="200px" height="150px"></td>
										<td style="font-size: 25px"><a
											th:href="@{'/admin/loadEditCategory/'+${cat.id}}"
											class="btn btn-primary btn-sm"><i
												class="fa-solid fa-pen-to-square  fa-1x"></i> Edit </a> <a
											th:href="@{'/admin/deleteCategory/'+${cat.id}}"
											class="btn btn-danger btn-sm"><i
												class="fa-solid fa-trash  fa-1x"></i>Delete</a></td>
									</tr>

								</tbody>
							</table>

							<div class="row">
								<div class="col-md-4">Total Category :
									[[${totalElements}]]</div>
								<div class="col-md-6">

									<nav aria-label="Page navigation example">

										<ul class="pagination">
											<li class="page-item"
												th:classappend="${isFirst} ? 'disabled':''"><a
												class="page-link"
												th:href="@{'/admin/category?pageNo='+${pageNo-1}}"
												aria-label="Previous"> <span aria-hidden="true">&laquo;</span>
											</a></li>

											<li th:each="i:${#numbers.sequence(1,totalPages)}"
												class="page-item"
												th:classappend="${pageNo+1==i}?'active':''" ]]><a
												class="page-link"
												th:href="@{'/admin/category?pageNo='+${i-1}}">[[${i}]]</a></li>

											<li class="page-item"
												th:classappend="${isLast} ? 'disabled':''"><a
												class="page-link"
												th:href="@{'/admin/category?pageNo='+${pageNo+1}}"
												aria-label="Next"> <span aria-hidden="true">&raquo;</span>
											</a></li>
										</ul>

									</nav>
								</div>

							</div>
						</div>
					</div>

				</div>

			</div>
		</div>

	</section>

</body>
</html>
