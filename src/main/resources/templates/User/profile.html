<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
	th:replace="~{base::layout(~{::section})}">
<head>
<meta charset="ISO-8859-1">
<title>user profile</title>
</head>
<body>
	<section>
	
		<div class="container mb-5" style="margin-top: 100px;">
			<div class="card shadow-lg p-4" style="border-radius: 20px;">
				<p class="text-center fs-2 pb-2"
					style="border-bottom: 2px solid #ccc; box-shadow: 0 4px 6px -4px rgba(0, 0, 0, 0.2);">
					My Profile</p>
				<th:block th:if="${session.succMsg}">
					<p class="text-success alert alert-success text-center"
						style="font-size: 27px" role="alert">[[${session.succMsg}]]</p>
					<th:block th:text="${@commonServiceImpl.removeSessionMessage()}"></th:block>
				</th:block>

				<th:block th:if="${session.errorMsg}">
					<p class="text-danger text-center  alert alert-danger"
						style="font-size: 27px">[[${session.errorMsg}]]</p>
					<th:block th:text="${@commonServiceImpl.removeSessionMessage()}"></th:block>

				</th:block>
				<!-- HEADER -->
				<div class="d-flex justify-content-between align-items-center mb-4">
					<h4 class="fw-bold">Welcome, [[${user.name}]]</h4>
					<br>
					<button class="btn btn-primary btn-sm">Edit</button>
				</div>

				<!-- PROFILE TOP -->
				<div class="d-flex align-items-center mb-4">
					<img th:src="@{'/images/profile/' + ${user.profileImage}}"
						class="rounded-circle border"
						style="width: 80px; height: 80px; object-fit: cover;">

					<div class="ms-3">
						<h5 class="mb-0">[[${user.name}]]</h5>
						<small class="text-muted">[[${user.email}]]</small>
					</div>
				</div>

				<!-- FORM -->
				<form action="/user/update-profile" method="post"
					enctype="multipart/form-data">

					<div class="row g-3">

						<div class="col-md-6">
							<label class="form-label">Full Name</label> <input type="text"
								name="name" class="form-control" th:value="${user.name}">
						</div>

						<div class="col-md-6">
							<label class="form-label">Mobile</label> <input type="text"
								name="mobileNumber" class="form-control"
								th:value="${user.mobileNumber}">
						</div>

						<div class="col-md-6">
							<label class="form-label">Email</label> <input type="text"
								class="form-control" th:value="${user.email}" readonly>
						</div>

						<div class="col-md-6">
							<label class="form-label">Address</label> <input type="text"
								name="address" class="form-control" th:value="${user.address}">
						</div>

						<div class="col-md-4">
							<label class="form-label">City</label> <input type="text"
								name="city" class="form-control" th:value="${user.city}">
						</div>

						<div class="col-md-4">
							<label class="form-label">State</label> <input type="text"
								name="state" class="form-control" th:value="${user.state}">
						</div>

						<div class="col-md-4">
							<label class="form-label">Pincode</label> <input type="text"
								name="pincode" class="form-control" th:value="${user.pincode}">
						</div>

						<div class="col-md-6">
							<label class="form-label">Upload Image</label> <input type="file"
								name="img" class="form-control">
						</div>

						<div class="col-md-3">
							<label class="form-label">Role</label> <input type="text"
								class="form-control" th:value="${user.role}" readonly>
						</div>

						<div class="col-md-3">
							<label class="form-label">Status</label> <input type="text"
								class="form-control" th:value="${user.isEnable}" readonly>
						</div>

					</div>

					<!-- BUTTON -->
					<div class="text-end mt-4 ">
						<input type="hidden" th:value="${user.id}" name="id">
						<button class="  btn btn-success px-4">Update Profile</button>
					</div>

				</form>

			</div>
		</div>
	</section>
</body>
</html>
